services:
  postgres:
    image: postgres:16-alpine
    container_name: muoffice-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: WebProgProjc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: MUOffice@2026
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
